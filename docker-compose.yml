# Cap logs on every service so a noisy container can't fill the disk.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── MariaDB ──────────────────────────────────────────────────────────────────
  db:
    image: mariadb:11
    restart: unless-stopped
    # 4G buffer pool sized for the 32GB bare-metal host this stack targets;
    # lower it if running on smaller hardware.
    command: --innodb-buffer-pool-size=4G
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - ./data/db:/var/lib/mysql
    networks:
      - wpnet
    logging: *default-logging
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - wpnet
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── WordPress ─────────────────────────────────────────────────────────────────
  wordpress:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST:     db
      WORDPRESS_DB_NAME:     ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER:     ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      # Extra PHP constants injected into wp-config.php
      WORDPRESS_CONFIG_EXTRA: |
        // ── Site URL (set before WordPress loads) ──────────────────────────
        define('WP_HOME',    '${SITE_URL}');
        define('WP_SITEURL', '${SITE_URL}');

        // ── Cloudflare Tunnel HTTPS shim ───────────────────────────────────
        // Cloudflare terminates TLS and forwards plain HTTP; this tells PHP
        // (and WordPress) the request was made over HTTPS so it generates
        // correct https:// URLs and avoids redirect loops.
        if ( isset( $$_SERVER['HTTP_X_FORWARDED_PROTO'] )
             && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https' ) {
            $$_SERVER['HTTPS'] = 'on';
        }

        // ── Restore real client IP (Cloudflare Tunnel) ─────────────────────
        // CF-Connecting-IP always contains the genuine visitor IP. Trusting it
        // is safe here because no host ports are published — every request
        // arrives via cloudflared, so the header cannot be spoofed.
        // This ensures WooCommerce logs correct customer IPs, geolocation/tax
        // works, and any IP passed to Stripe Radar as a server-side signal is
        // accurate (Radar's primary signals are still collected client-side by
        // Stripe.js directly from the browser, unaffected by the tunnel).
        if ( ! empty( $$_SERVER['HTTP_CF_CONNECTING_IP'] ) ) {
            $$_SERVER['REMOTE_ADDR'] = $$_SERVER['HTTP_CF_CONNECTING_IP'];
        }

        // ── Redis object cache ─────────────────────────────────────────────
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
      # ── Mail relay (msmtp) ──────────────────────────────────────────────
      # Dev: leave these unset (or keep mailpit defaults) — mail goes to Mailpit.
      # Prod: set SMTP_HOST/PORT/USER/PASS/AUTH=on/TLS=on in .env to use a real
      # provider. No image rebuild needed — the entrypoint re-renders msmtprc.
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_AUTH: ${SMTP_AUTH:-off}
      SMTP_TLS:  ${SMTP_TLS:-off}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-wordpress@localhost}
    volumes:
      - ./data/wordpress:/var/www/html
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    networks:
      - wpnet
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-fs", "-o", "/dev/null", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # No ports: — all inbound traffic comes through the Cloudflare Tunnel.

  # ── Mailpit (email testing) ──────────────────────────────────────────────────
  # Catches all outgoing mail from WordPress/WooCommerce during development.
  # SMTP endpoint:  mailpit:1025  (used by msmtp inside the wordpress container)
  # Web UI:         mailpit:8025  (expose via Cloudflare Tunnel + Access policy)
  #
  # To switch to a real mail provider: set SMTP_HOST/PORT/USER/PASS/AUTH/TLS in
  # .env and run `docker compose up -d` — msmtp reconfigures itself on restart.
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    networks:
      - wpnet
    volumes:
      - ./data/mailpit:/data
    environment:
      MP_DATABASE:               /data/mailpit.db
      MP_MAX_MESSAGES:           500
      MP_SMTP_AUTH_ACCEPT_ANY:   1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    logging: *default-logging
    # No ports: — reach the web UI via the Cloudflare Tunnel.
    # Add a public hostname  mail.your-domain.example → http://mailpit:8025
    # and protect it with a Cloudflare Access policy.

  # ── Cloudflare Tunnel ─────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      wordpress:
        condition: service_healthy
    networks:
      - wpnet
    logging: *default-logging

  # ── Automated DB backups ──────────────────────────────────────────────────────
  backup:
    image: fradelg/mysql-cron-backup:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST:    db
      MYSQL_USER:    ${MYSQL_USER}
      MYSQL_PASS:    ${MYSQL_PASSWORD}
      MYSQL_DB:      ${MYSQL_DATABASE}
      MAX_BACKUPS:   14          # keep 14 daily dumps (~2 weeks)
      CRON_TIME:     0 3 * * *  # run at 03:00 UTC daily
      GZIP_LEVEL:    6
    volumes:
      - ./backups:/backup
    networks:
      - wpnet
    logging: *default-logging

  # ── Automated WordPress files backups ─────────────────────────────────────────
  # Nightly gzipped tarball of the ./data/wordpress bind mount (core, plugins,
  # themes, uploads). Mirrors the `backup` service but for files instead of the DB.
  # BACKUP_PRUNING_PREFIX ensures rotation only touches wordpress-files-* tarballs
  # and never the *.sql.gz DB dumps that share the same ./backups directory.
  files-backup:
    image: offen/docker-volume-backup:latest
    restart: unless-stopped
    environment:
      BACKUP_CRON_EXPRESSION: "0 3 * * *"                         # 03:00 UTC daily
      BACKUP_FILENAME:        "wordpress-files-%Y-%m-%d_%H-%M-%S.tar.gz"
      BACKUP_PRUNING_PREFIX:  "wordpress-files-"
      BACKUP_RETENTION_DAYS:  "14"                                 # ~2 weeks
      BACKUP_COMPRESSION:     "gz"
    volumes:
      - ./data/wordpress:/backup/wordpress:ro  # read-only — cannot corrupt WP files
      - ./backups:/archive                     # same destination dir as DB dumps
    logging: *default-logging

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  wpnet:
    driver: bridge
